name: Prepare-Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Which part of the version to bump (major, minor, patch)'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - no-bump

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.next_version.outputs.tag }}
      sha: ${{ steps.commit.outputs.sha }}
      release_url: ${{ steps.create_draft_release.outputs.url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get current version
        id: current_version
        run: |
          current=$(jq -r '.version' package.json)
          echo "Current version: $current"
          echo "version=$current" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: next_version
        run: |
          if [[ "${{ github.event.inputs.version_bump }}" == "no-bump" ]]; then
            new_version="${{ steps.current_version.outputs.version }}"
            echo "No version bump selected."
          else
            IFS='.' read -r major minor patch <<< "${{ steps.current_version.outputs.version }}"
            case "${{ github.event.inputs.version_bump }}" in
              major)
                ((major+=1)); minor=0; patch=0;;
              minor)
                ((minor+=1)); patch=0;;
              patch)
                ((patch+=1));;
            esac
            new_version="$major.$minor.$patch"
            echo "Next version: $new_version"
          fi
          echo "version=$new_version" >> $GITHUB_OUTPUT
          echo "tag=v$new_version" >> $GITHUB_OUTPUT

      - name: Update package.json and jsr.jsonc
        if: github.event.inputs.version_bump != 'no-bump'
        run: |
          NEW_VERSION="${{ steps.next_version.outputs.version }}"
          
          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          
          # Update jsr.jsonc preserving comments
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW_VERSION\"/" jsr.jsonc

      - name: Update pnpm-lock.yaml
        if: github.event.inputs.version_bump != 'no-bump'
        run: pnpm install --lockfile-only

      - name: Update CHANGELOG.md
        if: github.event.inputs.version_bump != 'no-bump'
        run: |
          today=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [${{ steps.next_version.outputs.version }}] - $today/" CHANGELOG.md

      - name: Extract release notes from CHANGELOG
        id: release_notes
        run: |
          version="${{ steps.next_version.outputs.version }}"
          # Extract lines between the version header and the next ## header
          # Trim surrounding blank lines and normalize changelog issue refs from ([#123]) to (#123).
          awk "/^## \\[$version\\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
            | sed '/./,$!d' | sed -e :a -e '/^\s*$/{$d;N;ba}' \
            | sed 's/(\[#\([0-9]\+\)\])/(#\1)/g' > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "(No changelog entries found for $version)" > release-notes.md
          fi
          tag="v$version"
          prev_tag=$(git tag --sort=-version:refname | head -1)
          if [[ -n "$prev_tag" ]]; then
            echo "" >> release-notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${prev_tag}...${tag}" >> release-notes.md
          fi
          npm_url="https://www.npmjs.com/package/@decimalturn/toml-patch/v/${version}"
          jsr_url="https://jsr.io/@decimalturn/toml-patch@${version}"
          npm_badge="![npm](https://img.shields.io/badge/npm-${tag}-blue?logo=npm&logoColor=white&labelColor=red)"
          jsr_badge="![jsr](https://img.shields.io/badge/jsr-${tag}-blue?logo=jsr)"
          {
            echo ""
            echo "---"
            echo ""
            echo "### Version specific links"
            echo ""
            echo "| Registry | Link |"
            echo "|----------|------|"
            echo "| [${npm_badge}](${npm_url}) | ${npm_url} |"
            echo "| [${jsr_badge}](${jsr_url}) | ${jsr_url} |"
          } >> release-notes.md

      - name: Commit changes
        id: commit
        run: |
          if [[ "${{ github.event.inputs.version_bump }}" != "no-bump" ]]; then
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add package.json jsr.jsonc pnpm-lock.yaml CHANGELOG.md
            git commit -m "chore: bump version to ${{ steps.next_version.outputs.version }}"
            git push origin ${{ github.ref_name }}
          else
            echo "Skipping commit (no-bump selected)"
          fi
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        id: create_draft_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.next_version.outputs.tag }}
          target_commitish: ${{ steps.commit.outputs.sha }}
          body_path: release-notes.md
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  report:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - name: Add release link to summary
        run: |
          release_url="${{ needs.prepare-release.outputs.release_url }}"
          tag="${{ needs.prepare-release.outputs.tag }}"
          {
            echo "## Release prepared"
            echo ""
            echo "- Tag: \`${tag}\`"
            echo "- Draft release: [${release_url}](${release_url})"
          } >> "$GITHUB_STEP_SUMMARY"
