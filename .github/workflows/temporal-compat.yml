name: Temporal Compatibility

on:
  push:
    branches:
      - latest
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  polyfill:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [14, 16, 18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - run: npm install @js-temporal/polyfill --no-save
      - name: Smoke test
        id: smoke
        continue-on-error: true
        run: node scripts/smoke-temporal-polyfill.mjs
      - name: Record result
        if: always()
        shell: bash
        run: |
          mkdir -p results
          status="${{ steps.smoke.outcome }}"
          echo "$status" > results/polyfill-${{ matrix.node-version }}.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: polyfill-result-${{ matrix.node-version }}
          path: results/polyfill-${{ matrix.node-version }}.txt

  harmony:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [14, 16, 18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Smoke test
        id: smoke
        continue-on-error: true
        run: node --harmony-temporal scripts/smoke-temporal-harmony.cjs
      - name: Record result
        if: always()
        shell: bash
        run: |
          mkdir -p results
          status="${{ steps.smoke.outcome }}"
          echo "$status" > results/harmony-${{ matrix.node-version }}.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: harmony-result-${{ matrix.node-version }}
          path: results/harmony-${{ matrix.node-version }}.txt

  report:
    needs: [polyfill, harmony]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check polyfill results
        shell: bash
        run: |
          FAILED=0
          for v in 18 20 22 24; do
            echo "polyfill Node $v: ${{ needs.polyfill.result }}"
          done
          for v in 18 20 22 24; do
            echo "harmony Node $v: ${{ needs.harmony.result }}"
          done
          console.assert(obj.d.constructor.name.includes('PlainDate'));
          console.assert(obj.d.toString() === '2024-01-15');
          const z = Temporal.ZonedDateTime.from('2024-01-15T10:30:00+00:00[+00:00]');
          console.assert(stringify({ z }, FMT).includes('Z'));
          const obj2 = parse('d = 2024-01-15\\n');
          console.assert(obj2.d instanceof Date);
          console.log('OK');
          "
