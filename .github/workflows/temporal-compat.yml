name: Temporal Compatibility

on:
  push:
    branches:
      - latest
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  polyfill:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [14, 16, 18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - run: npm install @js-temporal/polyfill --no-save
      - name: Smoke test
        id: smoke
        continue-on-error: true
        run: |
          node --input-type=commonjs -e "
          const { Temporal } = require('@js-temporal/polyfill');
          globalThis.Temporal = Temporal;
          const { parse, stringify, patch } = require('./dist/toml-patch.js');
          const FMT = { trailingNewline: 0 };
          const obj = parse('d = 2024-01-15\\n', { temporal: true });
          console.assert(obj.d.constructor.name.includes('PlainDate'));
          console.assert(obj.d.toString() === '2024-01-15');
          const obj2 = parse('z = 2024-01-15T10:30:00+05:30\\n', { temporal: true });
          console.assert(obj2.z.constructor.name.includes('ZonedDateTime'));
          console.assert(stringify({ d: obj.d }, FMT) === 'd = 2024-01-15');
          console.assert(patch('d = 2024-01-15\\n', { d: obj.d }, FMT) === 'd = 2024-01-15');
          const obj3 = parse('d = 2024-01-15\\n');
          console.assert(obj3.d instanceof Date);
          console.log('OK');
          "
      - name: Record result
        if: always()
        shell: bash
        run: |
          mkdir -p results
          status="${{ steps.smoke.outcome }}"
          echo "$status" > results/polyfill-${{ matrix.node-version }}.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: polyfill-result-${{ matrix.node-version }}
          path: results/polyfill-${{ matrix.node-version }}.txt

  harmony:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [14, 16, 18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Smoke test
        id: smoke
        continue-on-error: true
        run: |
          node --harmony-temporal --input-type=commonjs -e "
          const { parse, stringify } = require('./dist/toml-patch.js');
          const FMT = { trailingNewline: 0 };
          const obj = parse('d = 2024-01-15\\n', { temporal: true });
          console.assert(obj.d.constructor.name.includes('PlainDate'));
          console.assert(obj.d.toString() === '2024-01-15');
          const z = Temporal.ZonedDateTime.from('2024-01-15T10:30:00+00:00[+00:00]');
          console.assert(stringify({ z }, FMT).includes('Z'));
          const obj2 = parse('d = 2024-01-15\\n');
          console.assert(obj2.d instanceof Date);
          console.log('OK');
          "
      - name: Record result
        if: always()
        shell: bash
        run: |
          mkdir -p results
          status="${{ steps.smoke.outcome }}"
          echo "$status" > results/harmony-${{ matrix.node-version }}.txt
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: harmony-result-${{ matrix.node-version }}
          path: results/harmony-${{ matrix.node-version }}.txt

  report:
    needs: [polyfill, harmony]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: '*-result-*'
          path: results
      - name: Generate summary
        shell: bash
        run: |
          echo "## Temporal Compatibility" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAILED=0
          for mode in polyfill harmony; do
            echo -n "| $mode |" >> $GITHUB_STEP_SUMMARY
            for v in 14 16 18 20 22 24; do
              f="results/${mode}-result-${v}/${mode}-${v}.txt"
              if [ -f "$f" ] && [ "$(cat "$f")" = "success" ]; then
                echo -n " ✅ |" >> $GITHUB_STEP_SUMMARY
              else
                echo -n " ❌ |" >> $GITHUB_STEP_SUMMARY
                if [ "$v" -ge 18 ]; then FAILED=1; fi
              fi
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          done
          if [ "$FAILED" = "1" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Temporal support is required for Node >= 18." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          console.assert(obj.d.constructor.name.includes('PlainDate'));
          console.assert(obj.d.toString() === '2024-01-15');
          const z = Temporal.ZonedDateTime.from('2024-01-15T10:30:00+00:00[+00:00]');
          console.assert(stringify({ z }, FMT).includes('Z'));
          const obj2 = parse('d = 2024-01-15\\n');
          console.assert(obj2.d instanceof Date);
          console.log('OK');
          "
