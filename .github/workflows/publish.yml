# Auth: Trusted Publishing: https://docs.npmjs.com/trusted-publishers

name: Publish Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Might be used by jsr for authentication purposes
    steps:

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org/'

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Install
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        continue-on-error: true

      - name: Publish to npm
        id: pnpm-publish
        run: pnpm publish --provenance --no-git-checks
        continue-on-error: true

      - name: Check git status
        run: git status && git diff

      - name: Publish to jsr
        run: pnpm run publish:jsr
        if: success() || steps.pnpm-publish.outcome == 'failure'
