name: Test and Build
on: 
  push:
    branches:
      - latest
      - master
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    # Protection Against Supply Chain Attacks: https://socket.dev/blog/introducing-socket-firewall
    - uses: socketdev/action@4337a545deecc20f19a909e52db7a2f6ba292f42 # v1.2.0
      with:
        mode: firewall
        firewall-version: latest # or use a pinned version (see releases)
    - name: Install
      run: sfw npm install
      env:
        CI: true
    - name: Typecheck
      run: npm run typecheck
    - name: Build
      run: npm run build
    - name: Test
      run: npm run test:all
    - name: Specs
      run: npm run specs
    - name: Benchmark (Example)
      run: npm run benchmark:example
    - name: Create build artifacts
      uses: actions/upload-artifact@v6
      with: 
        path: dist/
        name: dist
        
