name: Test and Build
on: 
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: true
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 22.x
    - name: Install
      run: npm install
      env:
        CI: true
    - name: Typecheck
      run: npm run typecheck
    - name: Test
      run: npm test
    - name: Specs
      run: npm run specs
    - name: Build
      run: npm run build
    - name: Benchmark
      run: npm run benchmark -- --example
    - name: Create build artifacts
      uses: actions/upload-artifact@v4
      with: 
        path: dist/
        name: dist
        
