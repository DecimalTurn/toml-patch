name: Test and Build
on: 
  push:
    branches:
      - latest
      - master
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: true
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
    # Protection Against Supply Chain Attacks: https://socket.dev/blog/introducing-socket-firewall
    - uses: socketdev/action@937f824ec476dfd164d4a4d9995751427b0be143 # v1.3.0
      with:
        mode: firewall
        firewall-version: latest # or use a pinned version (see releases)
    - name: Install
      run: sfw npm install
      env:
        CI: true
    - name: Typecheck
      run: npm run typecheck
    - name: Build
      run: npm run build
    - name: Test
      run: npm run test:all
    - name: Specs
      run: npm run specs
    - name: Benchmark (CI samples)
      run: npm run benchmark:ci
    - name: Check Performance
      run: node benchmark/check-performance.mjs
    - name: Write Benchmark Summary
      if: always()
      run: |
        if [ -f benchmark-parse.md ]; then
          echo "## Parse Benchmark" >> $GITHUB_STEP_SUMMARY
          cat benchmark-parse.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi
        if [ -f benchmark-stringify.md ]; then
          echo "## Stringify Benchmark" >> $GITHUB_STEP_SUMMARY
          cat benchmark-stringify.md >> $GITHUB_STEP_SUMMARY
        fi
    - name: Create build artifacts
      uses: actions/upload-artifact@v7
      with: 
        path: dist/
        name: dist
        
